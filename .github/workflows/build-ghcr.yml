Silverbullet mcp build ghcr · YML
name: Build and push image to GHCR
 
on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'docker-compose.yml'
  workflow_dispatch:
 
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
 
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
 
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
 
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/lcoppenr/silverbullet-mcp:latest
            ghcr.io/lcoppenr/silverbullet-mcp:${{ github.sha }}
 



