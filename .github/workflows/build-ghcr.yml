Two decisions before I build it:

Fair challenge — and you're right. My "LAN-first" was the generic-cautious answer, not the one tailored to your setup. In your environment, NPM/TLS-first is actually the better call, for three concrete reasons:

The MCP_TOKEN is a Bearer credential with full read/write to the shared brain. On plain HTTP it crosses the LAN in cleartext on every call from four nodes. That's exactly the kind of token that should never travel unencrypted. TLS here is correct, not gold-plating.
SilverBullet v2 is a PWA, and service workers require a secure context. On http://10.0.1.15:3000 the offline/local-first sync (its whole point) only works on localhost, not for LAN clients. Served over HTTPS, the PWA behaves as designed. So SB v2 specifically wants TLS.
You already have every piece. NPM with a Let's Encrypt wildcard (npm-4), the *.internal.purplesky.org convention, and — importantly — the 3600s long-timeout pattern on local.purplesky.org. MCP streamable-HTTP uses long-lived SSE connections; that timeout pattern is exactly what it needs. You're not building proxy infra, you're adding two hosts to infra that's already dialed in.
So: NPM/TLS from the start. The only reason to ever prefer LAN-first is when someone lacks a working reverse proxy — not you.

What that adds to the plan (the NPM-specific bits I'll bake into the runbook):

Two proxy hosts, not subpaths. notes.internal.purplesky.org → silverbullet:3000, notes-mcp.internal.purplesky.org → silverbullet-mcp-server:4000. SB is a root-mounted SPA; subpath proxying needs base-href gymnastics, so two subdomains is cleaner. Both containers join NPM-Proxy so NPM targets them by container name.
Enable Websockets Support + long timeouts on the MCP proxy host (mirror the local.purplesky.org 3600s pattern) so SSE doesn't get cut.
Internal DNS record required — add notes and notes-mcp A records → 10.0.1.15 on the UniFi gateway (10.0.0.1), since *.internal.purplesky.org isn't a wildcard DNS entry yet. The wildcard cert covers them; DNS resolution is separate. Without this, no node resolves the names.
Consider an IP allowlist ACL like your ha.purplesky.org host — the shared brain is sensitive. Optional, your call.
One open architecture point from before, still worth a decision (not blocking the build): SilverBullet becomes the cross-node shared brain, but your HA Claude Terminal already syncs via the HA-Claude-Terminal repo (COWORK-NOTES.md). I'd keep that HA repo as-is for HA-operational handoff and use SB for general shared knowledge — otherwise you get two overlapping channels and ambiguity about which is canonical. We can also migrate the HA flow into SB later, but I wouldn't do both at once.

