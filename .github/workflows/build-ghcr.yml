Confirmed — this is a known Portainer + BuildKit failure, not a problem with your compose or the fork. It fires when Portainer drives a build: through the Docker API/agent on engines where BuildKit can't list workers — and snap-packaged Docker (your ubuntuserver install) is a classic trigger. My earlier premise that "Portainer Repository build will just work" was wrong, so this is a re-plan, not a patch.

Three ways out, in my recommended order:

Build in GitHub Actions → push to GHCR → Portainer just pulls <span>(most durable)</span>. Add a CI workflow to your fork that builds ghcr.io/lcoppenr/silverbullet-mcp and change the compose from build: . to image: …. Portainer never builds again — it pulls a prebuilt image like all your other stacks. This permanently removes the snap-BuildKit fragility and auto-rebuilds when you pull upstream changes. I can set this up right now in the fork. One manual step: flip the GHCR package to public after the first build (or add registry creds in Portainer) so the pull is anonymous.
Build once on the host with the legacy builder, then deploy a pull-only stack <span>(fastest unblock)</span>. On ubuntuserver: clone the fork, DOCKER_BUILDKIT=0 docker compose build, then deploy with build: swapped for the local image tag. You're running in ~5 minutes, but the image lives only on that host and you rebuild manually on updates. I'd give you the exact commands.
Disable BuildKit daemon-wide on snap Docker <span>(not recommended)</span>. Edits /var/snap/docker/current/config/daemon.json and restarts the daemon — affects all 20+ stacks on that host to fix one. Too broad a blast radius for one service.
